name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx vitest run
      - name: Action bundle is reproducible
        run: |
          npm run build -w action
          git diff --quiet -- action/dist || { echo "::error::action/dist is stale — run npm run build -w action and commit"; exit 1; }
